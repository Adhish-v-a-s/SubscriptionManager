<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Subscription Analytics Workspace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div>
                <h1>Workspace Hub</h1>
                <p>Logged in as: <strong>{{ session['username'] }}</strong></p>
            </div>
            <a href="/logout" class="action-btn delete-btn" style="text-decoration:none; padding: 0.75rem 1.2rem;">Terminate Session</a>
        </header>

        <div class="workspace-grid">
            <div class="col-left">
                <div class="card">
                    <h3 id="form-context-title">Register New Subscription Asset</h3>
                    <form id="subscription-form">
                        <input type="hidden" id="editing-id" value="">
                        
                        <div class="form-group">
                            <label>Service Domain Name</label>
                            <input type="text" id="service_name" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Analytical Allocation Category</label>
                            <select id="category_id" class="form-select" required>
                                {% for c in categories %}
                                <option value="{{ c.category_id }}">{{ c.category_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Settlement Payment Conduit</label>
                            <select id="method_id" class="form-select" required>
                               <option value="">Select Payment Method</option>{% for m in methods %}
                                 <option value="{{ m.method_id }}">{{ m.method_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Cost Matrix Outflow</label>
                            <input type="number" step="0.01" id="cost" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Billing Operational Interval</label>
                            <select id="billing_cycle" class="form-select" required>
                                <option value="Monthly">Monthly</option>
                                <option value="Quarterly">Quarterly</option>
                                <option value="Yearly">Yearly</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Execution Effective Commencement Date</label>
                            <input type="date" id="start_date" class="form-control" required>
                        </div>

                        <div class="form-group" id="status-group" style="display: none;">
                            <label>Asset State Status</label>
                            <select id="status" class="form-select">
                                <option value="Active">Active</option>
                                <option value="Paused">Paused</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>

                        <button type="submit" id="submit-action-btn" class="btn-primary">Commit Asset Record</button>
                        <button type="button" id="cancel-edit-btn" class="action-btn" style="display:none; width:100%; margin-top:0.5rem;">Reset Interface Context</button>
                    </form>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <h3>Monitored Subscriptions Inventory</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Service</th>
                                    <th>Category</th>
                                    <th>Conduit</th>
                                    <th>Outflow</th>
                                    <th>Interval</th>
                                    <th>State</th>
                                    <th>Operations</th>
                                </tr>
                            </thead>
                            <tbody id="data-render-target">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', initializeWorkspace);

        // Global dataset buffer cache memory matrix
        let cachedSubscriptions = [];

        function initializeWorkspace() {
            loadSubscriptions();
            document.getElementById('subscription-form').addEventListener('submit', handleFormSubmission);
            document.getElementById('cancel-edit-btn').addEventListener('click', clearFormContext);
        }

        // READ OPERATION: Fetch collections data via API background thread layers
        async function loadSubscriptions() {
            const response = await fetch('/api/subscriptions');
            cachedSubscriptions = await response.get_json();
            renderTable(cachedSubscriptions);
        }

        function renderTable(data) {
            const target = document.getElementById('data-render-target');
            target.innerHTML = '';
            
            if(data.length === 0) {
                target.innerHTML = `<tr><td colspan="7" style="text-align:center; color:gray;">No assets currently logged.</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.service_name}</strong></td>
                    <td><span class="badge" style="background:#f1f5f9; color:#475569;">${item.category_name || 'General'}</span></td>
                    <td>${item.method_name || 'Unassigned Link'}</td>
                    <td>$${item.cost.toFixed(2)}</td>
                    <td>${item.billing_cycle}</td>
                    <td><span class="badge ${item.status === 'Active' ? 'badge-active' : 'badge-paused'}">${item.status}</span></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="triggerEditLifecycle(${item.subscription_id})">Edit</button>
                        <button class="action-btn delete-btn" onclick="triggerDeleteLifecycle(${item.subscription_id})">Delete</button>
                    </td>
                `;
                target.appendChild(tr);
            });
        }

        // CREATE & UPDATE HANDLER CONDUIT
        async function handleFormSubmission(e) {
            e.preventDefault();
            
            const editingId = document.getElementById('editing-id').value;
            const payload = {
                service_name: document.getElementById('service_name').value,
                category_id: parseInt(document.getElementById('category_id').value),
                method_id: parseInt(document.getElementById('method_id').value),
                cost: parseFloat(document.getElementById('cost').value),
                billing_cycle: document.getElementById('billing_cycle').value,
                start_date: document.getElementById('start_date').value,
                status: document.getElementById('status').value
            };

            let endpoint = '/api/subscriptions';
            let httpMethod = 'POST';

            if(editingId) {
                endpoint = `/api/subscriptions/${editingId}`;
                httpMethod = 'PUT'; // Map explicit runtime changes cleanly via PUT protocol
            }

            const response = await fetch(endpoint, {
                method: httpMethod,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const resData = await response.get_json();
            if(resData.success) {
                clearFormContext();
                loadSubscriptions(); // Refresh UI array safely without viewport blink disruptions
            }
        }

        // UPDATE HELPER: Populates input elements with existing data states
        function triggerEditLifecycle(id) {
            const item = cachedSubscriptions.find(s => s.subscription_id === id);
            if(!item) return;

            document.getElementById('editing-id').value = item.subscription_id;
            document.getElementById('service_name').value = item.service_name;
            document.getElementById('category_id').value = item.category_id || '';
            document.getElementById('method_id').value = item.method_id || '';
            document.getElementById('cost').value = item.cost;
            document.getElementById('billing_cycle').value = item.billing_cycle;
            document.getElementById('start_date').value = item.start_date;
            document.getElementById('status').value = item.status;

            // Transition UI text representations to showcase Update workflow explicitly
            document.getElementById('form-context-title').innerText = "Modify Subscription Configuration";
            document.getElementById('submit-action-btn').innerText = "Push Operational Updates";
            document.getElementById('status-group').style.display = 'block';
            document.getElementById('cancel-edit-btn').style.display = 'block';
        }

        // DELETE OPERATION LIFECYCLE TRIGGER
        async function triggerDeleteLifecycle(id) {
            if(confirm("Are you sure you want to delete this subscription asset?")) {
                const response = await fetch(`/api/subscriptions/${id}`, { method: 'DELETE' });
                const result = await response.get_json();
                if(result.success) {
                    loadSubscriptions();
                }
            }
        }

        function clearFormContext() {
            document.getElementById('subscription-form').reset();
            document.getElementById('editing-id').value = '';
            document.getElementById('form-context-title').innerText = "Register New Subscription Asset";
            document.getElementById('submit-action-btn').innerText = "Commit Asset Record";
            document.getElementById('status-group').style.display = 'none';
            document.getElementById('cancel-edit-btn').style.display = 'none';
        }
    </script>
</body>
</html>
